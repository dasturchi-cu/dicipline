name: rejabon_ai
description: REJABON AI — Shaxsiy Hayot Operatsion Tizimi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  share_plus: ^10.1.4
  file_picker: ^8.3.7
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  http: ^1.4.0
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  fonts:
    - family: MaterialIcons
      fonts:
        - asset: assets/fonts/MaterialIcons-Regular.otf
  assets:
    - assets/ai.env
